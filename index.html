<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHBK.FUN - Portail</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" type="image/png" href="faviconchbk.png"> 
</head>
<body>

    <div class="container">
        <h1 class="animated-title">CHBK<span class="dot">.</span>FUN</h1>

        <div class="games-grid-layout">
            
            <div class="game-block">
                <h2><i class="fa-solid fa-bolt"></i> Minigames</h2>
                <div class="game-links">
                    <a href="https://chbk.fun/RiokyRun" target="_blank" class="game-card"><i class="fa-solid fa-person-running"></i><span>Rioky Run</span></a>
                    <a href="https://chbk.fun/FacteurSnakeur/" target="_blank" class="game-card"><i class="fa-solid fa-worm"></i><span>Facteur Snakeur</span></a>
                    <a href="https://chbk.fun/chronogame" target="_blank" class="game-card"><i class="fa-solid fa-stopwatch"></i><span>ChronoGame</span></a>
                    <a href="https://chbk.fun/chbkcasino" target="_blank" class="game-card"><i class="fa-solid fa-coins"></i><span>CHBKASINO</span></a>
                </div>
            </div>

            <div class="game-block">
                <h2><i class="fa-solid fa-brain"></i> Quiz</h2>
                <div class="game-links">
                    <a href="https://chbk.fun/quizdepartements" target="_blank" class="game-card"><i class="fa-solid fa-map-location-dot"></i><span>Départements</span></a>
                    <a href="https://chbk.fun/quizcapitales" target="_blank" class="game-card"><i class="fa-solid fa-earth-americas"></i><span>Capitales</span></a>
                    <a href="https://chbk.fun/moviequiz" target="_blank" class="game-card"><i class="fa-solid fa-film"></i><span>Movie Quiz</span></a>
                    <a href="https://chbk.fun/blindtestchallenge" target="_blank" class="game-card"><i class="fa-solid fa-headphones"></i><span>Blind Test</span></a>
                </div>
            </div>

            <div class="game-block">
                <h2><i class="fa-solid fa-toolbox"></i> Utilitaires</h2>
                <div class="game-links">
                    <a href="https://chbk.fun/chibouk_repond" target="_blank" class="game-card"><i class="fa-solid fa-scroll"></i><span>CHBK Répond</span></a>
                    <a href="https://chbk.fun/chbkroulette" target="_blank" class="game-card"><i class="fa-solid fa-shuffle"></i><span>CHBK Roulette</span></a>
                    <a href="#" onclick="accessRandomizer(event)" class="game-card"><i class="fa-solid fa-circle-question"></i><span>CHBK Randomizer <i class="fa-solid fa-lock" style="font-size: 0.8rem; margin-left: 5px; opacity: 0.5;"></i></span></a>
                </div>
            </div>

            <div class="game-block">
                <h2><i class="fa-solid fa-dice"></i> Board Games</h2>
                <div class="game-links">
                    <a href="https://chbk.fun/chbkbomb/" target="_blank" class="game-card"><i class="fa-solid fa-bomb"></i><span>Chibouk Bomb</span></a>
                    <a href="https://chbk.fun/uno" target="_blank" class="game-card"><i class="fa-solid fa-layer-group"></i><span>Uno CHBK</span></a>
                </div>
            </div>

        </div> <div class="music-block-small">
            <h3><i class="fa-solid fa-music"></i> CHBK SONGS</h3>
            <div class="password-box">
                <div class="password-inputs">
                    <input type="password" id="music-pass" placeholder="Mot de passe">
                    <button onclick="checkPassword()"><i class="fa-solid fa-unlock"></i></button>
                </div>
                <p id="error-msg" class="error-message">Mot de passe incorrect</p>
            </div>
        </div>
        
    </div>

    <script>
        // Mot de passe dynamique (chbk + jour)
        function getDailyPassword() {
            return "chbk" + new Date().getDate();
        }

        // Accès aux chansons (Redirection)
        function checkPassword() {
            const input = document.getElementById('music-pass').value.toLowerCase().trim();
            const errorMsg = document.getElementById('error-msg');

            if (input === getDailyPassword()) {
                window.location.href = "chbk-songs-secret.html";
            } else {
                errorMsg.style.display = 'block';
                setTimeout(() => { errorMsg.style.display = 'none'; }, 2000);
            }
        }

        // Accès au Randomizer (Prompt)
        function accessRandomizer(event) {
            event.preventDefault();
            const pass = prompt("Ce site est protégé. Entrez le mot de passe :");
            if (pass && pass.toLowerCase().trim() === getDailyPassword()) {
                window.open("https://chbk.fun/chbkrandomizer", "_blank");
            } else if (pass !== null) {
                alert("Mot de passe incorrect !");
            }
        }

        // Entrée clavier pour les chansons
        document.getElementById('music-pass').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
</body>
</html>
