<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHBK SONGS - Espace VIP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" type="image/png" href="faviconchbk.png">
    <style>
        /* Style du bouton retour */
        .back-button {
            display: inline-flex;
            align-items: center;
            color: var(--orange-primary);
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 30px;
            transition: 0.3s;
        }
        .back-button:hover {
            color: var(--orange-light);
            transform: translateX(-5px);
        }
        .back-button i { margin-right: 10px; }
        
        /* Conteneur un peu plus large pour que les 3 vidéos respirent */
        .songs-container {
            max-width: 1300px;
            margin: 0 auto;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container songs-container">
        
        <h1 class="animated-title" style="font-size: 3rem; margin-bottom: 20px;">CHBK<span class="dot">.</span>SONGS</h1>
        
        <div style="text-align: left;">
            <a href="index.html" class="back-button">
                <i class="fa-solid fa-arrow-left"></i> Retour au portail
            </a>
        </div>

        <section class="section">
            <div class="video-grid">
                <div class="video-card">
                    <iframe src="https://www.youtube.com/embed/TmjZHbet3UM" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                    <p>Bouffeurs de bouses - Louis</p>
                </div>
                <div class="video-card">
                    <iframe src="https://www.youtube.com/embed/YA4k0n3jasU" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                    <p>Japonais - BigArno et Olouis</p>
                </div>
                <div class="video-card">
                    <iframe src="https://www.youtube.com/embed/pFdMTdFKw5s" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                    <p>La Chibouk - Arnaud</p>
                </div>
                <div class="video-card">
                    <iframe src="https://www.youtube.com/embed/7Hsz-PKbwm0" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                    <p>Au DD (Cover) - Arnaud & Louis</p>
                </div>
                <div class="video-card">
                    <iframe src="https://www.youtube.com/embed/9ZkhZwjCVYk" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                    <p>Le poinçonneur des Lilas (Cover) - Louis</p>
                </div>
                <div class="video-card">
                    <iframe src="https://www.youtube.com/embed/Vzhig4ozSPw" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                    <p>Il est le même que moi (Cover) - Niels</p>
                </div>
                <div class="video-card">
                    <iframe src="https://www.youtube.com/embed/0ILfPPC0HHQ" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                    <p>MwakaMoune (Cover) - Niels & Louis</p>
                </div>
                <div class="video-card">
                    <iframe src="https://youtube.com/embed/XHgI_cDS45U" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                    <p>J'ai encore rêvé d'elle - Niels PNL</p>
                </div>
            </div>
        </section>
        
    </div>

</body>
</html>
